name: Deploy static content to Pages

on:
  # Se ejecuta cuando hay un push a la rama principal
  push:
    branches: ["main"]
  
  # Permite ejecutar el workflow manualmente desde la pestaña Actions
  workflow_dispatch:

# Otorga los permisos necesarios para leer el repositorio y publicar en GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Permite solo un despliegue concurrente a la vez
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Sube todo el contenido del repositorio (donde están tus carpetas y archivos como index.html)
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
